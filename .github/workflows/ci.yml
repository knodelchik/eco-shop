name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript типізація
        run: npx tsc --noEmit

  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Next.js build з stub env-vars
        run: npm run build
        env:
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          NEXT_PUBLIC_BASE_URL: https://eco-shop-psi.vercel.app
          JWT_SECRET: ci-stub-secret-min-16-chars
          NEXT_PUBLIC_NEON_AUTH_URL: https://stub.example
          NEXT_PUBLIC_ADMIN_EMAILS: ci@example.com
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: stub
          NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: stub

  e2e:
    name: Playwright e2e (vs production)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Wait for Vercel deploy
        if: github.event_name == 'push'
        run: sleep 60
      - name: Run e2e tests
        run: npx playwright test --project=chromium
        env:
          BASE_URL: https://eco-shop-psi.vercel.app
          CI: 'true'
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
